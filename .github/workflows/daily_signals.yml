name: Daily Signals

on:
  schedule:
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  run-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ✅ (중요) 실행 "이전"의 verdict를 읽어두기 (어제/직전 실행 결과)
      - name: Load previous verdict (for new-entry alert)
        id: prev
        run: |
          if [ -f latest_signal.json ]; then
            PREV=$(python -c "import json;print(json.load(open('latest_signal.json',encoding='utf-8')).get('verdict',''))")
          else
            PREV=""
          fi
          echo "prev_verdict=$PREV" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate script
        run: python -m py_compile monitor_signals.py

      - name: Generate signal files
        run: python monitor_signals.py

      # ✅ 오늘 verdict를 읽고, "오늘 Entry AND 어제는 Entry 아님"일 때만 notify=true
      - name: Decide whether to open an Issue (new Entry only)
        id: decide
        env:
          PREV_VERDICT: ${{ steps.prev.outputs.prev_verdict }}
        run: |
          NEW=$(python -c "import json;print(json.load(open('latest_signal.json',encoding='utf-8')).get('verdict',''))")
          echo "new_verdict=$NEW" >> "$GITHUB_OUTPUT"

          echo "notify=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push if changed
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- latest_signal.json latest_signal.md; then
            echo "No signal changes to commit"
            exit 0
          fi

          DATE=$(date -u +%F)
          BRANCH="${GITHUB_REF_NAME}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest_signal.json latest_signal.md
          git commit -m "Update signals: ${DATE}"

          for i in 1 2 3; do
            git pull --rebase origin "${BRANCH}" || true
            if git push origin "HEAD:${BRANCH}"; then
              exit 0
            fi
            sleep 2
          done

          echo "Push failed after retries"
          exit 1

      # ✅ Entry가 "새로" 발생했을 때만 Issue 생성 (GitHub 앱 알림용)
      - name: Open an Issue for signal alert (new Entry only)
        if: steps.decide.outputs.notify == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            const verdict = "${{ steps.decide.outputs.new_verdict }}";
            const report = fs.readFileSync('latest_signal.md', 'utf8');
            const today = new Date().toISOString().slice(0, 10);

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 알림을 "사람"에게 보내기 위한 assignee 선택 로직:
            // - cron-job.org에서 PAT로 dispatch하면 보통 context.actor가 본인 계정
            // - schedule이면 github-actions[bot]일 수 있어서 repo owner로 fallback
            const actor = context.actor || "";
            const assignee = (actor && !actor.includes("github-actions")) ? actor : owner;

            const title = `📣 Signal Alert (${today}) - ${verdict}`;
            const body = `@${assignee}\n\n${report}`;

            try {
              // assignee 지정까지 시도 (앱에서 "할당 알림" 받기 좋음)
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                assignees: [assignee],
              });
            } catch (e) {
              // (예: owner가 조직이라 assignee 실패) -> 그래도 이슈는 만들기
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
            }
