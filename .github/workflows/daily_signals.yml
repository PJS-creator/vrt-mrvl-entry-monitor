name: Daily Signals

on:
  schedule:
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate signal files
        run: python monitor_signals.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- latest_signal.json latest_signal.md; then
            echo "No signal changes to commit"
            exit 0
          fi

          DATE=$(date -u +%F)
          BRANCH="${GITHUB_REF_NAME}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add latest_signal.json latest_signal.md
          git commit -m "Update signals: ${DATE}"

          # Handle non-fast-forward races when another run/user pushed first.
          for i in 1 2 3; do
            git pull --rebase origin "${BRANCH}" && git push origin "HEAD:${BRANCH}" && break
            if [ "$i" -eq 3 ]; then
              echo "Push failed after 3 attempts"
              exit 1
            fi
            echo "Retrying push ($i/3) after rebase..."
            sleep 2
          done
