name: Daily Signals

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  run-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate scripts
        run: python -m py_compile monitor_signals.py nwg_signal.py energy_signal_monitor.py build_latest_signal_all.py

      - name: Generate all signal files
        run: |
          python monitor_signals.py
          python nwg_signal.py
          python energy_signal_monitor.py
          python build_latest_signal_all.py

      - name: Commit and push if changed
        shell: bash
        run: |
          set -euo pipefail

          FILES=(
            latest_signal.json
            latest_signal.md
            nwg_latest_signal.json
            nwg_latest_signal.md
            latest_energy_signal.json
            latest_energy_signal.md
            latest_signal_all.md
          )

          if ! git status --porcelain -- "${FILES[@]}" | grep -q .; then
            echo "No signal changes to commit"
          else
            DATE=$(date -u +%F)
            BRANCH="${GITHUB_REF_NAME}"

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add "${FILES[@]}"
            git commit -m "Update signals: ${DATE}"

            for i in 1 2 3; do
              git pull --rebase origin "${BRANCH}" || true
              if git push origin "HEAD:${BRANCH}"; then
                break
              fi
              sleep 2
            done
          fi

      # ✅ 매일 실행될 때마다 무조건 Issue 생성 (알람 목적)
      - name: Create Issue for today's report (always)
        if: always()
        uses: actions/github-script@v8
        env:
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // KST(한국시간) 날짜/시각 만들기 (UTC+9)
            const now = new Date();
            const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
            const kstDate = kst.toISOString().slice(0, 10);
            const kstTime = kst.toISOString().replace('T', ' ').slice(0, 19);

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${context.runId}`;

            const readText = (p) => {
              try { return fs.readFileSync(p, 'utf8'); }
              catch (e) { return `_(missing: ${p})_`; }
            };

            const readVerdict = (p) => {
              try {
                const obj = JSON.parse(fs.readFileSync(p, 'utf8'));
                return obj && obj.verdict ? String(obj.verdict) : 'N/A';
              } catch (e) {
                return 'N/A';
              }
            };

            const coreVerdict = readVerdict('latest_signal.json');
            const nwgVerdict = readVerdict('nwg_latest_signal.json');
            const energyVerdict = readVerdict('latest_energy_signal.json');
            const reportAll = readText('latest_signal_all.md');

            // 알림을 확실히 받기 위해: 멘션 + (가능하면) assignee 지정
            const actor = context.actor || "";
            const assignee = (actor && !actor.includes("github-actions")) ? actor : owner;

            const title = `📌 Daily Signals (${kstDate})`;

            const body = [
              `@${assignee}`,
              ``,
              `- KST 실행 시각: **${kstTime}**`,
              `- Workflow status: **${process.env.JOB_STATUS}**`,
              `- Run: ${runUrl}`,
              ``,
              `## Quick Summary`,
              `- Core (VRT/MRVL): **${coreVerdict}**`,
              `- NatWest (NWG): **${nwgVerdict}**`,
              `- Energy (OXY/PBR/RIG/VG): **${energyVerdict}**`,
              ``,
              `<details><summary>Full report (latest_signal_all.md)</summary>`,
              ``,
              reportAll,
              ``,
              `</details>`,
              ``
            ].join('\n');

            try {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                assignees: [assignee],
              });
            } catch (e) {
              // assignee가 실패(예: 조직 owner)해도 이슈는 만들기
              await github.rest.issues.create({ owner, repo, title, body });
            }
