name: Daily Signals

on:
  schedule:
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate signal files
        run: python monitor_signals.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- latest_signal.json latest_signal.md; then
            echo "No signal changes to commit"
            exit 0
          fi
          DATE=$(date -u +%F)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest_signal.json latest_signal.md
          git commit -m "Update signals: ${DATE}"
          git push
