name: Daily Signals

on:
  schedule:
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate scripts
        run: python -m py_compile monitor_signals.py nwg_signal.py energy_signal_monitor.py build_latest_signal_all.py

      - name: Generate all signal files
        run: |
          python monitor_signals.py
          python nwg_signal.py
          python energy_signal_monitor.py
          python build_latest_signal_all.py

      - name: Commit and push if changed
        shell: bash
        run: |
          set -euo pipefail

          FILES=(
            latest_signal.json
            latest_signal.md
            nwg_latest_signal.json
            nwg_latest_signal.md
            latest_energy_signal.json
            latest_energy_signal.md
            latest_signal_all.md
          )

          # 새로 생긴 파일(첫 실행)도 잡아내려면 git diff 대신 git status가 안전합니다.
          if ! git status --porcelain -- "${FILES[@]}" | grep -q .; then
            echo "No signal changes to commit"
            exit 0
          fi

          DATE=$(date -u +%F)
          BRANCH="${GITHUB_REF_NAME}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${FILES[@]}"
          git commit -m "Update signals: ${DATE}"

          for i in 1 2 3; do
            git pull --rebase origin "${BRANCH}" || true
            if git push origin "HEAD:${BRANCH}"; then
              exit 0
            fi
            sleep 2
          done

          echo "Push failed after retries"
          exit 1
